app = "vision-ai-quant"
primary_region = "iad"

[build]
  dockerfile = "deployment/Dockerfile.quant"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  SESSION_COOKIE_SECURE = "true"
  ALLOW_PUBLIC_SIGNUP = "false"
  AUTH_LOCKOUT_THRESHOLD = "5"
  AUTH_LOCKOUT_WINDOW_SECONDS = "300"
  AUTH_LOCKOUT_DURATION_SECONDS = "900"
  WS_REQUIRE_ORIGIN_HEADER = "true"
  WS_ALLOW_QUERY_TOKEN = "false"

[processes]
  api = "uvicorn backend.src.api.main:app --host 0.0.0.0 --port 8080"
  trading = "python -m backend.src.platform.workers.trading_engine"
  risk = "python -m backend.src.platform.workers.risk_engine"
  execution = "python -m backend.src.platform.workers.execution_engine"

[[services]]
  processes = ["api"]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    method = "get"
    path = "/health"
