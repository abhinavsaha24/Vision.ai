name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: vision_core
      DB_USER: vision
      DB_PASSWORD: ci_test_password
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pip-audit

      - name: Validate dependency graph
        run: python -m pip check

      - name: Run backend tests
        run: pytest -q

      - name: Run Python security audit
        run: python -m pip_audit

  capital-readiness-gate:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run capital readiness pipeline
        run: |
          python scripts/run_capital_readiness_pipeline.py \
            --period 60d \
            --interval 1h \
            --output-dir data/ci_capital_readiness

      - name: Validate promotion readiness invariants
        run: |
          python scripts/validate_promotion_readiness.py \
            --readiness-path data/ci_capital_readiness/promotion_readiness.json \
            --registry-path data/ci_capital_readiness/edge_registry.json

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-capital-readiness
          path: |
            data/ci_capital_readiness/promotion_readiness.json
            data/ci_capital_readiness/edge_registry.json
            data/ci_capital_readiness/discovery_diagnostics.json
            data/ci_capital_readiness/validation_upgrade.json
            data/ci_capital_readiness/failure_diagnostics.json
            data/ci_capital_readiness/flow_quality_report.json

  runtime-e2e:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ci_test_password
      DB_HOST_PORT: "55432"
      APP_PORT: "8080"
      FORCE_TEST_TRADE: "1"
      FORCE_TEST_TRADE_EVERY_N_TICKS: "3"
      FORCE_TEST_TRADE_NOTIONAL: "25"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start quant runtime stack
        run: docker compose -f deployment/docker-compose.quant.yml up --build -d

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${APP_PORT}/health/ready" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "api_not_ready"
          docker compose -f deployment/docker-compose.quant.yml logs --tail=200
          exit 1

      - name: Publish synthetic ticks
        run: |
          for i in $(seq 1 24); do
            px=$(awk -v n="$i" 'BEGIN { printf "%.2f", 30000 + n * 7 }')
            sec=$(printf "%02d" "$i")
            curl -fsS -X POST "http://127.0.0.1:${APP_PORT}/events/market" \
              -H "Content-Type: application/json" \
              -d "{\"symbol\":\"BTCUSDT\",\"price\":${px},\"volume\":0.25,\"timestamp\":\"2025-01-01T00:00:${sec}Z\"}" >/dev/null
            sleep 0.5
          done

      - name: Verify runtime and persistence
        run: |
          python scripts/verify_system.py \
            --api-url "http://127.0.0.1:${APP_PORT}" \
            --database-url "postgresql://vision:${DB_PASSWORD}@127.0.0.1:${DB_HOST_PORT}/vision_core" \
            --require-trades

      - name: Dump runtime logs on failure
        if: failure()
        run: docker compose -f deployment/docker-compose.quant.yml logs --tail=300

      - name: Shutdown stack
        if: always()
        run: docker compose -f deployment/docker-compose.quant.yml down -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run frontend route tests
        run: npm run test:routes

      - name: Run frontend security audit
        run: npm audit --omit=dev --audit-level=moderate
