version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "10000:10000"
    env_file:
      - ../.env
    environment:
      - PORT=10000
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - REDIS_TTL=30
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  redis_data:
