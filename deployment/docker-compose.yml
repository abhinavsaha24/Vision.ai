version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgres://vision:ai@db:5432/vision_ai
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - REDIS_TTL=30
    depends_on:
      - redis
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=vision_ai
      - POSTGRES_USER=vision
      - POSTGRES_PASSWORD=ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  redis_data:
  postgres_data:
