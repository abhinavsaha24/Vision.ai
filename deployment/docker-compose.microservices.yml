version: "3.9"

name: vision-ai-microservices

networks:
  vision-net:
    driver: bridge

volumes:
  pg_core_data:
  pg_market_data:
  redis_data:

services:
  api-gateway:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.api_gateway_service:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - SESSION_COOKIE_SECURE=true
      - ALLOW_PUBLIC_SIGNUP=false
      - AUTH_LOCKOUT_THRESHOLD=5
      - AUTH_LOCKOUT_WINDOW_SECONDS=300
      - AUTH_LOCKOUT_DURATION_SECONDS=900
      - WS_REQUIRE_ORIGIN_HEADER=true
      - WS_ALLOW_QUERY_TOKEN=false
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - CORE_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@pg-core:5432/vision_core
      - TIMESCALE_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@timescaledb:5432/vision_market
      - RISK_SERVICE_URL=http://risk-service:8001
      - PORTFOLIO_SERVICE_URL=http://portfolio-service:8002
    depends_on:
      - redis
      - pg-core
      - timescaledb
      - risk-service
      - portfolio-service
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  market-data-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.market_data_service:app --host 0.0.0.0 --port 10101
    ports:
      - "10101:10101"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MARKET_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@timescaledb:5432/vision_market
      - CLICKHOUSE_URL=http://clickhouse:8123
    depends_on:
      - redis
      - timescaledb
      - clickhouse
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10101/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  feature-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.feature_service:app --host 0.0.0.0 --port 10102
    ports:
      - "10102:10102"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10102/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  model-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.model_service:app --host 0.0.0.0 --port 10103
    ports:
      - "10103:10103"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=/app/models
    depends_on:
      - redis
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10103/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  signal-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.signal_service:app --host 0.0.0.0 --port 10104
    ports:
      - "10104:10104"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - model-service
      - feature-service
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10104/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  strategy-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.strategy_service:app --host 0.0.0.0 --port 10105
    ports:
      - "10105:10105"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - signal-service
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10105/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  risk-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.risk_service:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORE_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@pg-core:5432/vision_core
    depends_on:
      - redis
      - pg-core
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  portfolio-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.portfolio_service:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORE_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@pg-core:5432/vision_core
    depends_on:
      - redis
      - pg-core
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  execution-gateway:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.execution_gateway:app --host 0.0.0.0 --port 10108
    ports:
      - "10108:10108"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORE_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@pg-core:5432/vision_core
    depends_on:
      - redis
      - pg-core
      - risk-service
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10108/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  order-state-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    command: uvicorn backend.src.services.order_state_service:app --host 0.0.0.0 --port 10109
    ports:
      - "10109:10109"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORE_DATABASE_URL=postgresql://${DB_USER:-vision}:${DB_PASSWORD:-ai}@pg-core:5432/vision_core
    depends_on:
      - redis
      - pg-core
    networks:
      - vision-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:10109/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vision-net

  pg-core:
    image: postgres:15-alpine
    environment:
      # development-only credentials; override via environment for non-local deployments
      - POSTGRES_DB=vision_core
      - POSTGRES_USER=vision
      - POSTGRES_PASSWORD=ai
    ports:
      - "5433:5432"
    volumes:
      - pg_core_data:/var/lib/postgresql/data
    networks:
      - vision-net

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      # development-only credentials; override via environment for non-local deployments
      - POSTGRES_DB=vision_market
      - POSTGRES_USER=vision
      - POSTGRES_PASSWORD=ai
    ports:
      - "5434:5432"
    volumes:
      - pg_market_data:/var/lib/postgresql/data
    networks:
      - vision-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - vision-net
