services:
  - type: web
    name: vision-ai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.src.api.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: PYTHON_VERSION
        value: "3.12"
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ALLOW_PUBLIC_SIGNUP
        value: "false"
      - key: AUTH_LOCKOUT_THRESHOLD
        value: "5"
      - key: AUTH_LOCKOUT_WINDOW_SECONDS
        value: "300"
      - key: AUTH_LOCKOUT_DURATION_SECONDS
        value: "900"
      - key: WS_REQUIRE_ORIGIN_HEADER
        value: "true"
      - key: WS_ALLOW_QUERY_TOKEN
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://127.0.0.1:3000,https://vision-ai-git-main-abhinav-sahas-projects.vercel.app,https://vision-ai-mu.vercel.app"
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
