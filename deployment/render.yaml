services:
  - type: web
    name: vision-ai-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.src.platform.api_service:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: PYTHON_VERSION
        value: "3.12"
      - key: LOG_LEVEL
        value: INFO
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://127.0.0.1:3000,https://vision-ai-git-main-abhinav-sahas-projects.vercel.app,https://vision-ai-mu.vercel.app"
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
