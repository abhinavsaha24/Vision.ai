services:
  - type: web
    name: vision-ai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.src.api.main
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: VISION_AI_SECRET
        generateValue: true