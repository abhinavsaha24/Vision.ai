apiVersion: v1
kind: Namespace
metadata:
  name: vision-ai
  labels:
    app.kubernetes.io/name: vision-ai
    app.kubernetes.io/part-of: vision-ai-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vision-ai-config
  namespace: vision-ai
data:
  TRADING_MODE: "paper"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  REDIS_ENABLED: "true"
  REDIS_TTL: "30"
  LIVE_TRADING_ENABLED: "false"
  LIVE_USE_TESTNET: "true"
  API_HOST: "0.0.0.0"
  API_PORT: "10000"
  PORT: "10000"
  DEFAULT_SYMBOL: "BTC/USDT"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,https://vision-ai-git-main-abhinav-sahas-projects.vercel.app,https://vision-ai-mu.vercel.app"
  CORS_ALLOW_ORIGIN_REGEX: ""
  NEXT_PUBLIC_API_URL: "http://vision-ai-backend:10000"
  NEXT_PUBLIC_WS_URL: "ws://vision-ai-backend:10000"
