apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vision-ai-default-deny
  namespace: vision-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vision-ai-allow-frontend-to-backend
  namespace: vision-ai
spec:
  podSelector:
    matchLabels:
      app: vision-ai-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: vision-ai-frontend
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 10000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vision-ai-allow-ingress-to-frontend
  namespace: vision-ai
spec:
  podSelector:
    matchLabels:
      app: vision-ai-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: vision-ai-backend
      ports:
        - protocol: TCP
          port: 10000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
