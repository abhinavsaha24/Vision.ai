apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-ai-frontend
  namespace: vision-ai
  labels:
    app.kubernetes.io/name: vision-ai-frontend
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vision-ai-frontend
  template:
    metadata:
      labels:
        app: vision-ai-frontend
        app.kubernetes.io/name: vision-ai-frontend
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: vision-ai-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: vision-ai-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vision-ai-frontend
  namespace: vision-ai
  labels:
    app.kubernetes.io/name: vision-ai-frontend
spec:
  selector:
    app: vision-ai-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: http
