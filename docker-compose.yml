version: "3.9"

services:
  # -------------------------------------------------
  # Backend API
  # -------------------------------------------------
  api:
    build: .
    container_name: vision-ai-api
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - PORT=10000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------
  # Redis (caching + message queue)
  # -------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vision-ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------
  # PostgreSQL (trade logs + audit trail)
  # -------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: vision-ai-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vision_ai
      POSTGRES_USER: vision
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_dev_123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
